<body>

<div>
<a onclick="showHome()">Home</a>
<a onclick="showCart()">🛒 Cart</a>

</div>

</header>

<div id="homePage">

<section class="hero">

<h1>Authentic Indian Spices</h1>

<p>Fresh • Pure • Traditional Taste</p>

</section>

<h2 style="text-align:center">Our Products</h2>

<div class="products" id="productList"></div>

</div>


<div id="cartPage">

<h2 style="text-align:center">🛒 Cart</h2>

<div id="cartItems"></div>

<p class="total">Total ₹<span id="total">0</span></p>

<div style="text-align:center">

<button onclick="placeOrder()">Place Order</button>

<br><br>

<button onclick="payUPI()">Pay with UPI</button>

<br><br>

<button onclick="orderWhatsApp()">Order on WhatsApp</button>

<br><br>

<button onclick="showHome()">Continue Shopping</button>

</div>

</div>


<div id="adminPage">

<div class="adminBox">

<h2>Admin Panel</h2>

<h3>Add Product</h3>

<input id="pname" placeholder="Product Name">
<input id="pprice" placeholder="Price">
<input id="pimage" placeholder="Image URL">

<button onclick="addProduct()">Add Product</button>

<h3>Orders</h3>

<div id="orders"></div>

</div>

</div>


<footer>

<p>© 2026 REDDY SPICES</p>

</footer>



<script>

let cart=[];

let products=[
{name:"Red Chilli Powder",price:120,image:"https://upload.wikimedia.org/wikipedia/commons/3/36/Chili_powder.jpg"},
{name:"Turmeric Powder",price:90,image:"https://upload.wikimedia.org/wikipedia/commons/0/0b/Turmeric_powder.jpg"}
];

function renderProducts(){

let html="";

products.forEach((p,i)=>{

html+=`

<div class="card">

<img src="${p.image}">

<h3>${p.name}</h3>

<p>₹${p.price}</p>

<input type="number" id="qty${i}" value="1" min="1">

<br><br>

<button onclick="addToCart('${p.name}',${p.price},'qty${i}')">Add to Cart</button>

</div>

`;

});

document.getElementById("productList").innerHTML=html;

}

renderProducts();


function addToCart(name,price,qtyId){

let qty=document.getElementById(qtyId).value;

cart.push({name,price,qty});

updateCart();

}

function updateCart(){

let html="";
let total=0;

cart.forEach((item,i)=>{

let itemTotal=item.price*item.qty;

total+=itemTotal;

html+=`

<div class="cart-item">

${item.name} (${item.qty}) - ₹${itemTotal}

<button onclick="removeItem(${i})">X</button>

</div>

`;

});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText=total;

}

function removeItem(i){

cart.splice(i,1);
updateCart();

}

function showCart(){

homePage.style.display="none";
cartPage.style.display="block";

}

function showHome(){

cartPage.style.display="none";
adminPage.style.display="none";
homePage.style.display="block";

}

function payUPI(){

let total=document.getElementById("total").innerText;

window.location.href=`upi://pay?pa=8143945514@ybl&pn=REDDY SPICES&am=${total}&cu=INR`;

}

function orderWhatsApp(){

let total=document.getElementById("total").innerText;

let msg="Hello I want to order:%0A";

cart.forEach(i=>{
msg+=i.name+" x "+i.qty+"%0A";
});

msg+="Total ₹"+total;

window.open("https://wa.me/919949495514?text="+msg);

}

</script>


<script type="module">

const app=initializeApp(firebaseConfig);

window.placeOrder=async function(){

let total=document.getElementById("total").innerText;

});

cart=[];
updateCart();

}catch(e){

alert("Login failed");

}

}

async function showAdmin(){

homePage.style.display="none";
cartPage.style.display="none";
adminPage.style.display="block";

let query=await getDocs(collection(db,"orders"));

let html="";

query.forEach(doc=>{

let d=doc.data();

html+=`<div class="cart-item">Order ₹${d.total}</div>`;

});

document.getElementById("orders").innerHTML=html;

}

window.addProduct=function(){

let name=document.getElementById("pname").value;
let price=document.getElementById("pprice").value;
let image=document.getElementById("pimage").value;

products.push({name,price,image});

renderProducts();

}

</script>

</body>

</html>
